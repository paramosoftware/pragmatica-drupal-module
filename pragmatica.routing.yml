pragmatica.dashboard:
  path: '/admin/pragmatica'
  defaults:
    _controller: '\Drupal\pragmatica\Controller\PragmaticaController::dashboard'
    _title: 'Painel - Pragmática'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE


###################################################
############### Code routes #######################
###################################################

entity.pragmatica_code.collection:
  path: '/admin/pragmatica/code'
  defaults:
    _entity_list: 'pragmatica_code'
    _title: 'Códigos'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE

entity.pragmatica_code.canonical:
  path: '/admin/pragmatica/code/{pragmatica_code}'
  defaults:
    _entity_view: 'pragmatica_code'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE

entity.pragmatica_code.add_form:
  path: '/admin/pragmatica/code/add'
  defaults:
    _entity_form: 'pragmatica_code.add'
    _title: 'Adicionar código'
  requirements:
    _permission: 'pragmatica'
  options:
      _admin_route: TRUE

entity.pragmatica_code.edit_form:
  path: '/admin/pragmatica/code/{pragmatica_code}/edit'
  defaults:
    _entity_form: 'pragmatica_code.edit'
    _title: 'Editar código'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE


entity.pragmatica_code.delete_form:
  path: '/admin/pragmatica/code/{pragmatica_code}/delete'
  defaults:
    _entity_form: 'pragmatica_code.delete'
    _title: 'Apagar código'
  requirements:
    _permission: 'pragmatica'
  options:
    _admin_route: TRUE


